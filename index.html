<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movnix Database | Serverless Streaming Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['Outfit', 'monospace'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background-color: #030303; color: #e5e5e5; }
    .glass { background: rgba(12, 12, 12, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  </style>
</head>
<body class="min-h-screen font-sans bg-[#030303] text-[#e5e5e5]">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <!-- Header -->
    <header class="flex justify-between items-center mb-12 border-b border-[#1f1f1f] pb-6">
      <div class="flex items-center space-x-3">
        <span class="text-2xl font-bold font-mono tracking-tight text-white">MOVNIX<span class="text-zinc-600">/DB</span></span>
        <span class="bg-[#111] text-zinc-400 text-xs px-2.5 py-0.5 rounded-full border border-[#222]">Serverless Catalog</span>
      </div>
      <a href="https://github.com/movnixbot/movnix-db" target="_blank" class="text-sm font-semibold text-zinc-400 hover:text-white flex items-center space-x-1.5 transition">
        <i data-lucide="github" class="w-4 h-4"></i>
        <span>GitHub Repo</span>
      </a>
    </header>

    <!-- Search bar & Tab selectors -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-8">
      <div class="relative flex-1 max-w-xl">
        <i data-lucide="search" class="absolute left-4 top-3.5 w-5 h-5 text-zinc-500"></i>
        <input 
          id="search-input"
          type="text" 
          placeholder="Search movies or TV shows..." 
          class="w-full bg-[#0c0c0c] border border-[#1f1f1f] rounded-lg pl-12 pr-4 py-3 text-sm text-white placeholder-zinc-500 focus:outline-none focus:border-zinc-700 transition"
        />
      </div>
      <div class="flex space-x-2 bg-[#0c0c0c] p-1 rounded-lg border border-[#1f1f1f]">
        <button id="tab-movies" class="px-4 py-2 rounded-md text-xs font-semibold font-mono bg-white text-black transition">MOVIES</button>
        <button id="tab-tv" class="px-4 py-2 rounded-md text-xs font-semibold font-mono text-zinc-400 hover:text-white transition">TV SHOWS</button>
      </div>
    </div>

    <!-- Main Grid -->
    <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
      <!-- Loading Skeleton -->
    </div>
  </div>

  <!-- Detail Modal overlay -->
  <div id="modal-container" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm hidden px-4 py-6">
    <div class="relative w-full max-w-5xl bg-[#0c0c0c] border border-[#1f1f1f] rounded-xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
      <button id="modal-close" class="absolute right-4 top-4 z-10 p-2 rounded-full bg-black/60 border border-[#1f1f1f] text-zinc-400 hover:text-white transition">
        <i data-lucide="x" class="w-5 h-5"></i>
      </button>

      <!-- Modal scrollable body -->
      <div class="overflow-y-auto flex-1 p-6 md:p-8">
        <div class="grid md:grid-cols-3 gap-8">
          <!-- Left side: Poster & Info -->
          <div>
            <img id="modal-poster" src="" alt="Poster" class="w-full rounded-lg shadow-md border border-[#1f1f1f]" />
            <div class="mt-6 space-y-4">
              <div>
                <span class="block text-xs font-mono text-zinc-500 uppercase">Release Date</span>
                <span id="modal-date" class="text-sm font-semibold text-white">-</span>
              </div>
              <div>
                <span class="block text-xs font-mono text-zinc-500 uppercase">Popularity Score</span>
                <span id="modal-popularity" class="text-sm font-semibold text-white">-</span>
              </div>
            </div>
          </div>

          <!-- Right side: Stream Player & Metadata -->
          <div class="md:col-span-2 space-y-6 flex flex-col justify-between">
            <div>
              <h2 id="modal-title" class="text-3xl font-extrabold text-white leading-tight">-</h2>
              <p id="modal-overview" class="mt-4 text-sm text-zinc-400 leading-relaxed">-</p>
            </div>

            <!-- Video Player block -->
            <div class="space-y-4">
              <h3 class="text-sm font-mono font-semibold text-zinc-400 uppercase">Watch Stream Player</h3>
              <div class="relative aspect-video rounded-lg overflow-hidden border border-[#1f1f1f] bg-black">
                <iframe 
                  id="player-iframe"
                  src="" 
                  class="absolute inset-0 w-full h-full"
                  allowfullscreen
                  sandbox="allow-scripts allow-same-origin allow-forms"
                ></iframe>
              </div>

              <!-- Stream links selectors and subtitles -->
              <div class="grid sm:grid-cols-2 gap-4">
                <div>
                  <label class="block text-xs font-mono text-zinc-500 uppercase mb-1.5">Select Stream Source</label>
                  <select id="select-source" class="w-full bg-[#111] border border-[#1f1f1f] rounded px-3 py-1.5 text-xs text-white focus:outline-none focus:border-zinc-700"></select>
                </div>
                <div>
                  <label class="block text-xs font-mono text-zinc-500 uppercase mb-1.5">Subtitle Tracks (CDN)</label>
                  <div id="subtitles-list" class="flex flex-wrap gap-1.5">
                    <!-- Dynamic Subtitle Badges -->
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentTab = 'movies';
    let moviesData = [];
    let tvData = [];

    // Initialize lucide icons
    lucide.createIcons();

    // DOM Elements
    const gridContainer = document.getElementById('grid-container');
    const searchInput = document.getElementById('search-input');
    const tabMovies = document.getElementById('tab-movies');
    const tabTv = document.getElementById('tab-tv');
    
    const modalContainer = document.getElementById('modal-container');
    const modalClose = document.getElementById('modal-close');
    const modalPoster = document.getElementById('modal-poster');
    const modalTitle = document.getElementById('modal-title');
    const modalOverview = document.getElementById('modal-overview');
    const modalDate = document.getElementById('modal-date');
    const modalPopularity = document.getElementById('modal-popularity');
    const playerIframe = document.getElementById('player-iframe');
    const selectSource = document.getElementById('select-source');
    const subtitlesList = document.getElementById('subtitles-list');

    // Fetch lists
    async function loadData() {
      renderSkeleton();
      try {
        const [moviesRes, tvRes] = await Promise.all([
          fetch('./search/movies.json').then(r => r.json()).catch(() => []),
          fetch('./search/tv.json').then(r => r.json()).catch(() => [])
        ]);
        moviesData = moviesRes;
        tvData = tvRes;
        renderGrid();
      } catch (err) {
        gridContainer.innerHTML = '<div class="col-span-full text-center text-red-500 font-mono text-xs">Failed to load static database files.</div>';
      }
    }

    function renderSkeleton() {
      gridContainer.innerHTML = Array(12).fill(0).map(function() {
        return '<div class="animate-pulse space-y-3">' +
          '<div class="aspect-[2/3] bg-[#0c0c0c] border border-[#1f1f1f] rounded-lg"></div>' +
          '<div class="h-4 bg-[#0c0c0c] rounded w-2/3"></div>' +
          '<div class="h-3 bg-[#0c0c0c] rounded w-1/3"></div>' +
          '</div>';
      }).join('');
    }

    function renderGrid(filterStr) {
      filterStr = filterStr || '';
      const list = currentTab === 'movies' ? moviesData : tvData;
      const query = filterStr.toLowerCase().trim();
      
      const filtered = list.filter(function(item) {
        const title = (item.title || item.name || '').toLowerCase();
        const overview = (item.overview || '').toLowerCase();
        return title.indexOf(query) !== -1 || overview.indexOf(query) !== -1;
      });

      if (filtered.length === 0) {
        gridContainer.innerHTML = '<div class="col-span-full text-center text-zinc-500 font-mono text-xs py-12">No titles found matching your search.</div>';
        return;
      }

      gridContainer.innerHTML = filtered.map(function(item) {
        const title = item.title || item.name;
        const date = item.releaseDate || item.firstAirDate || '-';
        const year = date.split('-')[0];
        const posterUrl = item.posterPath ? 'https://image.tmdb.org/t/p/w342' + item.posterPath : 'https://placehold.co/342x513/0c0c0c/555?text=No+Poster';
        
        return '<div onclick="openItem(' + item.id + ', \'' + currentTab + '\')" class="group cursor-pointer space-y-2">' +
          '<div class="relative aspect-[2/3] rounded-lg overflow-hidden border border-[#1f1f1f] bg-[#0c0c0c] transition duration-300 group-hover:border-zinc-500 shadow-md">' +
          '<img src="' + posterUrl + '" alt="' + title + '" class="absolute inset-0 w-full h-full object-cover transition duration-500 group-hover:scale-105" loading="lazy" />' +
          '<div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition duration-300 flex items-center justify-center">' +
          '<div class="p-3 bg-white text-black rounded-full shadow-lg">' +
          '<i data-lucide="play" class="w-5 h-5 fill-current"></i>' +
          '</div>' +
          '</div>' +
          '</div>' +
          '<div>' +
          '<h4 class="text-xs font-semibold text-white tracking-wide truncate group-hover:text-zinc-300 transition">' + title + '</h4>' +
          '<span class="text-[10px] font-mono text-zinc-500">' + year + ' • ' + currentTab.toUpperCase() + '</span>' +
          '</div>' +
          '</div>';
      }).join('');
      lucide.createIcons();
    }

    async function openItem(id, type) {
      modalContainer.classList.remove('hidden');
      modalContainer.classList.remove('hidden');
      document.body.classList.add('overflow-hidden');

      // Set temporary state
      modalTitle.innerText = 'Loading...';
      modalOverview.innerText = 'Retrieving details from flat-file database...';
      modalPoster.src = '';
      playerIframe.src = '';
      selectSource.innerHTML = '';
      subtitlesList.innerHTML = '';

      try {
        const itemType = type === 'movies' ? 'movies' : 'tv';
        const detailRes = await fetch('./' + itemType + '/' + id + '.json').then(function(r) { return r.json(); });
        
        const isMovie = type === 'movies';
        const dataObj = isMovie ? detailRes.movie : detailRes.tvShow;
        
        const title = isMovie ? dataObj.title : dataObj.name;
        const overview = dataObj.overview || 'No synopsis available.';
        const date = (isMovie ? dataObj.releaseDate : dataObj.firstAirDate) || '-';
        const posterUrl = dataObj.posterPath ? 'https://image.tmdb.org/t/p/w500' + dataObj.posterPath : 'https://placehold.co/500x750/0c0c0c/555?text=No+Poster';
        const popularityVal = dataObj.popularity ? dataObj.popularity.toFixed(1) : '-';
        
        modalTitle.innerText = title;
        modalOverview.innerText = overview;
        modalDate.innerText = date;
        modalPoster.src = posterUrl;
        modalPopularity.innerText = popularityVal;

        // Load stream sources select options
        const streams = detailRes.streamingLinks || [];
        if (streams.length > 0) {
          selectSource.innerHTML = streams.map(function(s) {
            return '<option value="' + s.url + '">' + s.source + '</option>';
          }).join('');
          playerIframe.src = streams[0].url;
          
          selectSource.onchange = function(e) {
            playerIframe.src = e.target.value;
          };
        } else {
          const embedUrl = type === 'movies' 
            ? 'https://vidsrc.to/embed/movie/' + id 
            : 'https://vidsrc.to/embed/tv/' + id;
          selectSource.innerHTML = '<option value="' + embedUrl + '">VidSrc (Embed)</option>';
          playerIframe.src = embedUrl;
        }

        // Subtitles list
        const subs = detailRes.subtitles || [];
        if (subs.length > 0) {
          subtitlesList.innerHTML = subs.map(function(sub) {
            const label = sub.label || sub.language.toUpperCase();
            return '<a href="' + sub.url + '" target="_blank" class="inline-flex items-center space-x-1 px-2.5 py-1 rounded bg-zinc-900 border border-[#1f1f1f] text-[10px] font-mono text-zinc-300 hover:text-white transition">' +
              '<i data-lucide="download" class="w-3 h-3"></i>' +
              '<span>' + label + '</span>' +
              '</a>';
          }).join('');
        } else {
          subtitlesList.innerHTML = '<span class="text-xs text-zinc-500 font-mono">No subtitles synced yet.</span>';
        }
        lucide.createIcons();
      } catch (err) {
        modalTitle.innerText = 'Failed to Load details';
        modalOverview.innerText = 'Error fetching static item details.';
      }
    }

    function closeItem() {
      modalContainer.classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
      playerIframe.src = '';
    }

    // Event Listeners
    searchInput.addEventListener('input', (e) => renderGrid(e.target.value));
    
    tabMovies.addEventListener('click', () => {
      currentTab = 'movies';
      tabMovies.className = 'px-4 py-2 rounded-md text-xs font-semibold font-mono bg-white text-black transition';
      tabTv.className = 'px-4 py-2 rounded-md text-xs font-semibold font-mono text-zinc-400 hover:text-white transition';
      searchInput.value = '';
      renderGrid();
    });

    tabTv.addEventListener('click', () => {
      currentTab = 'tv';
      tabTv.className = 'px-4 py-2 rounded-md text-xs font-semibold font-mono bg-white text-black transition';
      tabMovies.className = 'px-4 py-2 rounded-md text-xs font-semibold font-mono text-zinc-400 hover:text-white transition';
      searchInput.value = '';
      renderGrid();
    });

    modalClose.addEventListener('click', closeItem);
    
    modalContainer.addEventListener('click', (e) => {
      if (e.target === modalContainer) closeItem();
    });

    // Start load
    loadData();
  </script>
</body>
</html>
